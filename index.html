<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="static/config.js"></script>
</head>
<body class="min-h-full bg-gray-50 font-sans text-gray-900 antialiased">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="min-w-0">
        <h1 id="site-title" class="text-sm font-semibold text-gray-900 truncate"></h1>
        <p class="text-xs text-gray-400 font-mono mt-0.5 truncate">
          <span id="server-name"></span><span id="uptime" class="ml-2 text-gray-300"></span>
        </p>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <div class="flex items-center gap-1.5 select-none">
          <span class="text-xs text-gray-400">Auto</span>
          <button id="refresh-toggle" onclick="toggleAutoRefresh()"
            role="switch" aria-checked="false" title="Toggle auto-refresh"
            class="relative w-8 h-4 rounded-full bg-gray-300 transition-colors focus:outline-none cursor-pointer">
            <span id="toggle-thumb" class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow transition-transform translate-x-0"></span>
          </button>
        </div>
        <button
          onclick="refresh()"
          class="text-xs text-gray-500 hover:text-gray-800 border border-gray-200 rounded-lg px-3 py-1.5 hover:bg-gray-50 active:bg-gray-100 transition select-none">
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-6">

    <!-- Meta row -->
    <div class="flex items-center justify-between text-xs text-gray-400 px-0.5 mb-4">
      <span id="last-checked"></span>
      <span id="next-refresh"></span>
    </div>

    <!-- 2-column grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 items-start">

      <!-- Left column: Network + Browser Connectivity -->
      <div class="space-y-4">
        <div id="network-section"></div>
        <div id="direct-section"></div>
      </div>

      <!-- Right column: Service Health + TREX -->
      <div id="server-section">
        <div class="rounded-xl border border-gray-200 bg-white shadow-sm p-10 text-center text-sm text-gray-400 animate-pulse">
          Checking services…
        </div>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-gray-300 py-10 space-y-0.5">
    <p>Checks run from your browser &amp; via CGI at <span id="footer-host" class="font-mono"></span></p>
  </footer>

  <script src="static/app.js"></script>
</body>
</html>
